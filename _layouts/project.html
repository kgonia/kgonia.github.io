---
layout: default
---
<article class="talk">
  <header class="talk-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}<p class="talk-desc">{{ page.description }}</p>{% endif %}
  </header>

  <div class="talk-body">
    {{ content }}
  </div>

  {% unless page.hide_support %}{% include support-cta.html %}{% endunless %}

  <p class="talk-back"><a href="{{ '/projects/' | relative_url }}">&larr; All projects</a></p>
</article>
